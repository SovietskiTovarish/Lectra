name: lectra
description: An offline-first attendance and timetable companion for university students.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dynamic_color: ^1.7.0
  cupertino_icons: ^1.0.8
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  http: ^1.2.2
  package_info_plus: ^8.0.2
  shared_preferences: ^2.3.2
  open_filex: ^4.5.0
  google_mobile_ads: ^7.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.13
  build: ^2.4.2
  build_resolvers: ^2.4.2

flutter:
  uses-material-design: true